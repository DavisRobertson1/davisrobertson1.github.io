<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="DR network monogram">
  <rect width="64" height="64" rx="14" fill="#2563eb"/>
  <!-- simple network motif: three nodes + links -->
  <g stroke="#ffffff" stroke-width="3" fill="#ffffff">
    <line x1="16" y1="20" x2="48" y2="44" stroke-opacity="0.55"/>
    <line x1="48" y1="20" x2="16" y2="44" stroke-opacity="0.55"/>
    <circle cx="16" cy="20" r="5"/>
    <circle cx="48" cy="20" r="5"/>
    <circle cx="32" cy="32" r="5"/>
    <circle cx="16" cy="44" r="5"/>
    <circle cx="48" cy="44" r="5"/>
  </g>
</svg>
